framework:
    secret: '%env(APP_SECRET)%'
    #default_locale: en
    #csrf_protection: true
    #http_method_override: true

    # Hinter einem Reverse-Proxy: damit Request::getClientIp() die echte IP
    # liefert (statt der Proxy-IP) und X-Forwarded-* nicht spoofbar ist.
    # Default leer = keinem Proxy vertrauen; echte Proxy-IPs/-Ranges per ENV
    # TRUSTED_PROXIES je Deployment setzen (z. B. "127.0.0.1,10.0.0.0/8").
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers: [ 'x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port' ]

    #esi: true
    #fragments: true
    php_errors:
        log: true

    cache:
        pools:
            doctrine.system_cache_pool:
                adapter: cache.adapter.filesystem
            doctrine.result_cache_pool:
                adapter: cache.adapter.filesystem

    translator: { fallbacks: [de] }
    form: ~
    csrf_protection:
        enabled: true
    validation:
        enable_attributes: true
    default_locale:  '%locale%'
    session:
        handler_id:  session.handler.native_file
        save_path:   '%kernel.project_dir%/../var/sessions/%kernel.environment%'
        cookie_secure: auto
        cookie_httponly: true
        cookie_samesite: lax
    fragments:
        path: /_fragment
    http_method_override: true
    assets:
        #version: '%assets_version%'
        json_manifest_path: '%kernel.project_dir%/public/build/manifest.json'
    router:
        strict_requirements: ~

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
        profiler: { enabled: true, collect: false }
